services:
  postgres:
    image: postgres:16-alpine
    container_name: windrose-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: windrose-redis
    networks:
      - internal
    restart: unless-stopped

  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/windrose-api:${IMAGE_TAG:-latest}
    container_name: windrose-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - AzureAd__TenantId=${AZURE_TENANT_ID}
      - AzureAd__ClientId=${AZURE_CLIENT_ID}
      - Frontend__Url=${FRONTEND_URL}
    volumes:
      - log_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - web
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/windrose-frontend:${IMAGE_TAG:-latest}
    container_name: windrose-frontend
    networks:
      - web
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  web:
    external: true

volumes:
  postgres_data:
  log_storage:
