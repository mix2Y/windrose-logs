# Внутренняя сеть — только VPN/LAN доступ
# Сервис доступен только через 10.0.0.38 (внутренний IP)

server {
    listen 10.0.0.38:80;
    server_name windroselogs;

    # Frontend
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 500m;
        proxy_read_timeout   300s;
    }

    # Hangfire (admin only, same network)
    location /hangfire {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }
}

# Блокируем публичный IP — не слушаем на нём вообще
# (UFW закрывает 80/443 с публичной стороны, nginx вообще не биндится)
