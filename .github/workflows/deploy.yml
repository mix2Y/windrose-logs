name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'
      - name: Build
        run: dotnet build src/WindroseLogs.API/WindroseLogs.API.csproj -c Release

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install & Build
        working-directory: frontend
        env:
          VITE_AZURE_TENANT_ID: placeholder
          VITE_AZURE_CLIENT_ID: placeholder
        run: |
          npm ci
          npm run build
